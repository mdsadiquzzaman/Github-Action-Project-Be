name: E2E Tests (PR Gate)

on:
  pull_request:
    branches: [ "main" ]

jobs:
  e2e-tests:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22.x
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Install Playwright Chromium Browser
      run: npx playwright install chromium --with-deps

    - name: Create .env file
      run: |
        echo "PORT=3000" >> .env
        echo "MONGO_URI=mongodb://127.0.0.1:27017/node_crud_api" >> .env
        echo "JWT_SECRET=ci_e2e_secret_key" >> .env

    - name: Seed the Database
      run: npm run seed
    
    - name: Get E2E Tags from PR Labels
      id: get-tags
      run: |
        # Get all labels from the PR and join them with spaces
        LABELS="${{ join(github.event.pull_request.labels.*.name, ' ') }}"
        echo "PR Labels: $LABELS"
        
        GREP_TAGS=""
        
        # Check for e2e:brands
        if echo "$LABELS" | grep -q "e2e:brands"; then
          if [ -n "$GREP_TAGS" ]; then GREP_TAGS="${GREP_TAGS}|"; fi
          GREP_TAGS="${GREP_TAGS}@brands"
        fi
        
        # Check for e2e:items
        if echo "$LABELS" | grep -q "e2e:items"; then
          if [ -n "$GREP_TAGS" ]; then GREP_TAGS="${GREP_TAGS}|"; fi
          GREP_TAGS="${GREP_TAGS}@items"
        fi
        
        # Check for e2e:auth
        if echo "$LABELS" | grep -q "e2e:auth"; then
          if [ -n "$GREP_TAGS" ]; then GREP_TAGS="${GREP_TAGS}|"; fi
          GREP_TAGS="${GREP_TAGS}@auth"
        fi
        
        echo "Playwright Grep Tags: $GREP_TAGS"
        echo "grep_tags=$GREP_TAGS" >> $GITHUB_OUTPUT

    - name: Run Playwright E2E Tests
      run: |
        # If tags were found, run only those tests. Otherwise, run all tests.
        if [ -n "${{ steps.get-tags.outputs.grep_tags }}" ]; then
          echo "Running targeted tests..."
          npx playwright test --grep "${{ steps.get-tags.outputs.grep_tags }}"
        else
          echo "No specific E2E label found. Running ALL tests..."
          npx playwright test
        fi

    - name: Upload Playwright Report & Failures
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-e2e-report
        path: |
          playwright-report/
          test-results/
        retention-days: 7
