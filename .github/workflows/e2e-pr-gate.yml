name: E2E Tests (PR Gate)

on:
  pull_request:
    branches: [ "main" ]

jobs:
  e2e-tests:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22.x
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Install Playwright Chromium Browser
      run: npx playwright install chromium --with-deps

    - name: Create .env file
      run: |
        echo "PORT=3000" >> .env
        echo "MONGO_URI=mongodb://127.0.0.1:27017/node_crud_api" >> .env
        echo "JWT_SECRET=ci_e2e_secret_key" >> .env

    # 1. Start the API in the background
    - name: Start API Server
      run: npm start &
      
    # 2. Wait for API to be ready (Mirrors our local bash script logic)
    - name: Wait for API to be ready
      run: |
        until [ "$(curl -s -o /dev/null -w '%{http_code}' http://localhost:3000/api-docs/)" = "200" ]; do
          echo "Waiting for API..."
          sleep 2
        done
        echo "API is ready!"

    # 3. Seed the Database (Now we know the API and DB are fully connected)
    - name: Seed the Database
      run: npm run seed

    # 4. Parse Tags (From previous step)
    - name: Get E2E Tags from PR Labels
      id: get-tags
      run: |
        LABELS="${{ join(github.event.pull_request.labels.*.name, ' ') }}"
        GREP_TAGS=""
        if echo "$LABELS" | grep -q "e2e: brand"; then
          if [ -n "$GREP_TAGS" ]; then GREP_TAGS="${GREP_TAGS}|"; fi
          GREP_TAGS="${GREP_TAGS}@brand"
        fi
        if echo "$LABELS" | grep -q "e2e: item"; then
          if [ -n "$GREP_TAGS" ]; then GREP_TAGS="${GREP_TAGS}|"; fi
          GREP_TAGS="${GREP_TAGS}@item"
        fi
        if echo "$LABELS" | grep -q "e2e: auth"; then
          if [ -n "$GREP_TAGS" ]; then GREP_TAGS="${GREP_TAGS}|"; fi
          GREP_TAGS="${GREP_TAGS}@auth"
        fi
        echo "grep_tags=$GREP_TAGS" >> $GITHUB_OUTPUT
    # 5. Run Tests
    - name: Run Playwright E2E Tests
      run: |
        if [ -n "${{ steps.get-tags.outputs.grep_tags }}" ]; then
          npx playwright test --grep "${{ steps.get-tags.outputs.grep_tags }}"
        else
          npx playwright test
        fi

    - name: Upload Playwright Report & Failures
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-e2e-report
        path: |
          playwright-report/
          test-results/
        retention-days: 7
